name: iOS Build and Deploy

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web assets
        run: npm run build
      
      - name: Sync to iOS
        run: npx cap sync ios
      
      - name: Bump build number (prevent Apple duplicate rejection)
        run: python3 scripts/bump-build.py

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer && xcodebuild -version
      
      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install --repo-update
      
      - name: Setup App Store Connect API Key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          set -e
          mkdir -p ~/private_keys
          printf '%s\n' "$ASC_KEY_P8" > ~/private_keys/$ASC_KEY_ID.p8
          chmod 600 ~/private_keys/$ASC_KEY_ID.p8
          if head -1 ~/private_keys/$ASC_KEY_ID.p8 | grep -q 'BEGIN PRIVATE KEY'; then
            echo "✅ ASC API key installed"
          else
            echo "❌ Key file invalid"
            exit 1
          fi
      
      - name: Archive (automatic signing via ASC API)
        run: |
          cd ios
          xcodebuild archive \
            -scheme App \
            -workspace App/App.xcworkspace \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/App.xcarchive \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/private_keys/${{ secrets.ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.ASC_ISSUER_ID }}
      
      - name: Export IPA
        run: |
          cd ios
          mkdir -p build/export
          
          cat > build/exportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>automatic</string>
              <key>teamID</key>
              <string>M6BWMNZQ57</string>
          </dict>
          </plist>
          PLIST
          
          xcodebuild -exportArchive \
            -archivePath ./build/App.xcarchive \
            -exportOptionsPlist ./build/exportOptions.plist \
            -exportPath ./build/export
          
          echo "✅ IPA exported to: build/export/App.ipa"
      
      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          echo "=== Uploading IPA to TestFlight ==="
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_P8" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          
          xcrun altool --upload-app \
            --type ios \
            --file ios/build/export/App.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
          echo "✅ Uploaded to TestFlight"
