name: iOS Build and Deploy

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web assets
        run: npm run build
      
      - name: Sync to iOS
        run: npx cap sync ios
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Install Fastlane
        run: gem install fastlane
      
      - name: Setup API Key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          set -e
          KEY_FILE="ios/AuthKey.p8"
          mkdir -p ios
          
          # Detect if the secret is base64-encoded and decode if necessary
          if echo "$ASC_KEY_P8" | base64 -d 2>/dev/null | grep -q 'BEGIN PRIVATE KEY'; then
            echo "Detected base64-encoded key — decoding..."
            echo "$ASC_KEY_P8" | base64 -d > "$KEY_FILE"
          else
            echo "Writing raw PEM key..."
            printf '%s\n' "$ASC_KEY_P8" > "$KEY_FILE"
          fi
          
          chmod 600 "$KEY_FILE"
          
          # Validate PEM format
          if head -1 "$KEY_FILE" | grep -q 'BEGIN PRIVATE KEY'; then
            echo "✅ Key file is valid PEM, size: $(wc -c < "$KEY_FILE") bytes"
          else
            echo "❌ Key file does not look like PEM:"
            head -3 "$KEY_FILE"
            exit 1
          fi
      
      - name: Build and Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          cd ios
          echo "=== Directory contents ==="
          ls -la
          echo "=== Running fastlane build ==="
          fastlane build
