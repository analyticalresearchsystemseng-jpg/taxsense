name: iOS Build and Deploy

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync to iOS
        run: npx cap sync ios

      - name: Bump build number
        run: python3 scripts/bump-build.py

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer && xcodebuild -version

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install --repo-update

      - name: Build, sign, and deploy iOS app
        run: bash scripts/ci-build.sh
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_DIST_P12 }}
          P12_PASSWORD: ${{ secrets.IOS_DIST_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: TempPass123
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}

      - name: Upload build summary and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-summary
          path: |
            /tmp/BUILD_SUMMARY.txt
            /tmp/archive.log
            /tmp/export.log
            /tmp/upload.log
            ios/build/export/App.ipa
          if-no-files-found: ignore
          retention-days: 1
