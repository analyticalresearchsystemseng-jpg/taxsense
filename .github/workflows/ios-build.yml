name: iOS Build and Deploy

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web assets
        run: npm run build
      
      - name: Sync to iOS
        run: npx cap sync ios
      
      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install --repo-update
      
      - name: Setup App Store Connect API Key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          set -e
          KEY_FILE="/tmp/AuthKey.p8"
          printf '%s\n' "$ASC_KEY_P8" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          if head -1 "$KEY_FILE" | grep -q 'BEGIN PRIVATE KEY'; then
            echo "✅ Key file ready for xcodebuild"
          else
            echo "❌ Key file invalid"
            exit 1
          fi
      
      - name: Download Provisioning Profile
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          pip3 install -q PyJWT 2>/dev/null || true
          
          TOKEN=$(python3 -c "
          import jwt, time
          with open('/tmp/AuthKey.p8') as f: key = f.read()
          token = jwt.encode({'iss': '$ASC_ISSUER_ID', 'iat': int(time.time()), 'exp': int(time.time()) + 1200, 'aud': 'appstoreconnect-v1'}, key, algorithm='ES256', headers={'kid': '$ASC_KEY_ID', 'typ': 'JWT'})
          print(token)
          ")
          
          PROFILE=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.appstoreconnect.apple.com/v1/profiles?filter[name]=match%20AppStore%20uk.co.taxsense.app%201778177425")
          PROFILE_ID=$(echo "$PROFILE" | python3 -c "import sys,json; print(json.load(sys.stdin)['data'][0]['id'])")
          
          DETAIL=$(curl -s -H "Authorization: Bearer $TOKEN" \
            "https://api.appstoreconnect.apple.com/v1/profiles/$PROFILE_ID")
          PROFILE_B64=$(echo "$DETAIL" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['attributes']['profileContent'])")
          PROFILE_UUID=$(echo "$DETAIL" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['attributes']['uuid'])")
          
          PROFILES_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES_DIR"
          echo "$PROFILE_B64" | base64 -d > "$PROFILES_DIR/$PROFILE_UUID.mobileprovision"
          echo "✅ Profile installed: $PROFILE_UUID"
      
      - name: Archive (manual signing)
        run: |
          cd ios
          xcodebuild archive \
            -scheme App \
            -workspace App/App.xcworkspace \
            -destination 'generic/platform=iOS' \
            -archivePath ./build/App.xcarchive
      
      - name: Export IPA
        run: |
          cd ios
          mkdir -p build/export
          
          cat > build/exportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string>${{ secrets.ASC_TEAM_ID }}</string>
          </dict>
          </plist>
          PLIST
          
          xcodebuild -exportArchive \
            -archivePath ./build/App.xcarchive \
            -exportOptionsPlist ./build/exportOptions.plist \
            -exportPath ./build/export
          
          echo "✅ IPA exported to: build/export/App.ipa"
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
      
      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          echo "=== Uploading IPA to TestFlight ==="
          xcrun altool --upload-app \
            --type ios \
            --file ios/build/export/App.ipa \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID"
          echo "✅ Uploaded to TestFlight"
