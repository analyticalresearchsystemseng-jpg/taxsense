name: iOS Build and Deploy

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build web assets
        run: npm run build
      
      - name: Sync to iOS
        run: npx cap sync ios
      
      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install --repo-update
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true
      
      - name: Install Fastlane
        run: gem install fastlane
      
      - name: Setup API Key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: |
          set -e
          KEY_FILE="ios/AuthKey.p8"
          mkdir -p ios
          
          # Write raw PEM key
          printf '%s\n' "$ASC_KEY_P8" > "$KEY_FILE"
          chmod 600 "$KEY_FILE"
          
          # Validate PEM format
          if head -1 "$KEY_FILE" | grep -q 'BEGIN PRIVATE KEY'; then
            echo "✅ Key file is valid PEM, size: $(wc -c < "$KEY_FILE") bytes"
          else
            echo "❌ Key file does not look like PEM"
            exit 1
          fi
      
      - name: Configure Git Credentials for Match
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          set -e
          echo "Configuring git credentials for Match repo access..."
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"
          echo "✅ Git credentials configured"
      
      - name: Build and Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_TEAM_ID: ${{ secrets.ASC_TEAM_ID }}
          MATCH_PASSWORD: ${{ secrets.MATCH_PASSWORD }}
        run: |
          cd ios
          echo "=== Running fastlane build ==="
          fastlane build
